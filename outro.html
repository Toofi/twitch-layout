<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:          #3e3e3e;
    --panel:       #636466;
    --juno-red:    #b13a26;
    --juno-blue:   #3c4bb0;
    --juno-orange: #f87d37;
    --juno-yellow: #e9bc3f;
    --juno-blue-bright: #6478dc;
    --white:       #f0ede8;
    --serigraph:   #e8e4dc;
    --ivory:       #f5dfa0;
    --muted:       #a09880;
  }

  body {
    width:1920px; height:1080px;
    background:var(--bg);
    overflow:hidden;
    font-family:'Rajdhani', sans-serif;
  }

  .metal-texture {
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      180deg, transparent 0px, transparent 2px,
      rgba(255,255,255,0.025) 2px, rgba(255,255,255,0.025) 3px
    );
    pointer-events:none;
  }

  .center-panel {
    position:absolute;
    left:80px; right:80px; top:80px; bottom:80px;
    background:var(--panel);
    border-radius:4px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.1),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      0 2px 8px rgba(0,0,0,0.35);
    opacity:0;
    animation:fadeIn 0.6s ease 0.2s forwards;
  }

  .scanlines {
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
    pointer-events:none; z-index:100;
  }

  @keyframes fadeIn    { to { opacity:1; } }
  @keyframes fadeInFull{ to { opacity:1; } }
  @keyframes fadeUp    {
    from{ opacity:0; transform:translateY(12px); }
    to  { opacity:1; transform:translateY(0); }
  }

  /* Bandes couleur */
  .band-top, .band-bot {
    position:absolute; left:0; right:0; display:flex; height:6px; z-index:10;
    opacity:0; animation:fadeIn 0.6s ease 0.3s forwards;
  }
  .band-top { top:0; }
  .band-bot { bottom:0; }
  .b { flex:1; }
  .b-r { background:var(--juno-red); }
  .b-b { background:var(--juno-blue); }
  .b-o { background:var(--juno-orange); }
  .b-y { background:var(--juno-yellow); }

  /* Rack stripes */
  .rack-stripe {
    position:absolute; top:0; bottom:0; width:5px; z-index:10;
    opacity:0; animation:fadeIn 0.4s ease 0.5s forwards;
  }
  .rack-stripe.left  { left:0;  background:linear-gradient(180deg,var(--juno-red),var(--juno-blue),var(--juno-orange),var(--juno-yellow)); }
  .rack-stripe.right { right:0; background:linear-gradient(180deg,var(--juno-yellow),var(--juno-orange),var(--juno-blue),var(--juno-red)); }

  /* Bloc central */
  .center-block {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    z-index:20;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  .logo-stack { position:relative; display:inline-block; line-height:0.88; }
  .t-tnr {
    font-family:'Times New Roman',Times,serif;
    font-style:italic; font-weight:400; font-size:110px;
    position:absolute; top:0; left:0;
    white-space:nowrap; pointer-events:none;
    background:linear-gradient(135deg,#b13a26 0%,#3c4bb0 28%,#f87d37 55%,#e9bc3f 78%,#b13a26 100%);
    background-size:300% 300%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 10s ease-in-out infinite;
  }
  .t-av {
    font-family:'Avenir Next Condensed','Avenir','Arial Narrow','Gill Sans MT Condensed',sans-serif;
    font-weight:400; font-size:110px; letter-spacing:-0.01em;
    position:relative; white-space:nowrap;
    background:linear-gradient(135deg,#b13a26 0%,#3c4bb0 28%,#f87d37 55%,#e9bc3f 78%,#b13a26 100%);
    background-size:300% 300%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 10s ease-in-out infinite;
  }
  .main-name { opacity:0; animation:fadeIn 1s ease 0.4s forwards; }

  .color-rule {
    display:flex; align-items:center; gap:0;
    margin-top:16px; width:720px;
    opacity:0; animation:fadeIn 0.5s ease 1.1s forwards;
  }
  .cr-line { flex:1; height:1px; background:rgba(0,0,0,0.35); }
  .cr-dots { display:flex; gap:8px; margin:0 16px; }
  .cr-dot  { width:8px; height:8px; border-radius:50%; animation:dotPulse 3s ease-in-out infinite; }
  .cr-dot.r { background:var(--juno-red);    animation-delay:0s; }
  .cr-dot.b { background:var(--juno-blue);   animation-delay:0.5s; }
  .cr-dot.o { background:var(--juno-orange); animation-delay:1.0s; }
  .cr-dot.y { background:var(--juno-yellow); animation-delay:1.5s; }
  @keyframes dotPulse {
    0%,100%{ opacity:0.5; transform:scale(1); }
    50%    { opacity:1;   transform:scale(1.25); }
  }

  /* Texte principal — blanc net sur gris */
  .merci-main {
    margin-top:32px;
    font-family:'Rajdhani', sans-serif;
    font-size:38px; font-weight:600;
    letter-spacing:8px; text-transform:uppercase;
    color:var(--white);
    opacity:0; animation:fadeUp 0.8s ease 1.5s forwards;
  }

  /* Sous-texte ivory — très lisible sur gris foncé */
  .merci-sub {
    margin-top:14px;
    font-family:'Share Tech Mono', monospace;
    font-size:14px; letter-spacing:5px;
    color:var(--ivory);
    opacity:0; animation:fadeUp 0.7s ease 2.1s forwards;
  }

  .wave-wrap {
    position:absolute; bottom:100px; left:0; right:0; height:80px;
    opacity:0; animation:fadeIn 0.8s ease 1.3s forwards; z-index:5;
  }
  #waveCanvas { width:1920px; height:80px; display:block; }

  /* LED latérales */
  .side-leds {
    position:absolute; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:12px;
    opacity:0; animation:fadeInFull 0.6s ease 1.4s forwards; z-index:20;
  }
  .side-leds.left  { left:28px; }
  .side-leds.right { right:28px; }
  .s-led {
    width:5px; height:5px; border-radius:50%;
    animation:ledSteady var(--d,3.5s) ease-in-out infinite var(--dl,0s);
  }
  @keyframes ledSteady {
    0%,100%{ opacity:0.35; }
    50%    { opacity:1; }
  }

  /* VU-mètres aux 4 couleurs Juno */
  .vu-row {
    position:absolute; top:48px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px; align-items:flex-end; height:40px;
    opacity:0; animation:fadeInFull 0.7s ease 1.0s forwards; z-index:20;
  }
  .vub {
    width:7px; border-radius:2px 2px 0 0;
    animation:vuSteady var(--d,1.5s) ease-in-out infinite alternate;
  }
  @keyframes vuSteady { from{ height:8px; } to{ height:var(--h,30px); } }
</style>
</head>
<body>

<div class="metal-texture"></div>
<div class="center-panel"></div>
<div class="scanlines"></div>

<div class="rack-stripe left"></div>
<div class="rack-stripe right"></div>

<div class="band-top">
  <div class="b b-r"></div><div class="b b-b"></div>
  <div class="b b-o"></div><div class="b b-y"></div>
</div>
<div class="band-bot">
  <div class="b b-y"></div><div class="b b-o"></div>
  <div class="b b-b"></div><div class="b b-r"></div>
</div>

<div class="vu-row">
  <div class="vub" style="background:rgba(177,58,38,0.7); --h:28px;--d:1.4s"></div>
  <div class="vub" style="background:rgba(177,58,38,0.55);--h:36px;--d:1.8s;animation-delay:0.1s"></div>
  <div class="vub" style="background:rgba(60,75,176,0.7); --h:22px;--d:1.2s;animation-delay:0.2s"></div>
  <div class="vub" style="background:rgba(60,75,176,0.55);--h:32px;--d:1.6s"></div>
  <div class="vub" style="background:rgba(248,125,55,0.7);--h:26px;--d:1.3s;animation-delay:0.3s"></div>
  <div class="vub" style="background:rgba(248,125,55,0.6);--h:38px;--d:1.7s;animation-delay:0.1s"></div>
  <div class="vub" style="background:rgba(233,188,63,0.7);--h:20px;--d:1.1s;animation-delay:0.25s"></div>
</div>

<div class="side-leds left">
  <div class="s-led" style="background:var(--juno-red);   color:var(--juno-red);   --d:3.8s;--dl:0s"></div>
  <div class="s-led" style="background:var(--juno-blue);  color:var(--juno-blue);  --d:5.2s;--dl:0.7s"></div>
  <div class="s-led" style="background:var(--juno-orange);color:var(--juno-orange);--d:4.5s;--dl:1.5s"></div>
  <div class="s-led" style="background:var(--juno-yellow);color:var(--juno-yellow);--d:6.0s;--dl:0.3s"></div>
  <div class="s-led" style="background:var(--juno-red);   color:var(--juno-red);   --d:3.3s;--dl:2.0s"></div>
</div>
<div class="side-leds right">
  <div class="s-led" style="background:var(--juno-yellow);color:var(--juno-yellow);--d:4.8s;--dl:1.1s"></div>
  <div class="s-led" style="background:var(--juno-orange);color:var(--juno-orange);--d:3.6s;--dl:0.5s"></div>
  <div class="s-led" style="background:var(--juno-blue);  color:var(--juno-blue);  --d:5.5s;--dl:1.8s"></div>
  <div class="s-led" style="background:var(--juno-red);   color:var(--juno-red);   --d:4.1s;--dl:0.9s"></div>
  <div class="s-led" style="background:var(--juno-yellow);color:var(--juno-yellow);--d:6.3s;--dl:0.2s"></div>
</div>

<div class="center-block">
  <div class="main-name"><div class="logo-stack"><div class="t-tnr">Toofi</div><div class="t-av">Toofi</div></div></div>
  <div class="color-rule">
    <div class="cr-line"></div>
    <div class="cr-dots">
      <div class="cr-dot r"></div><div class="cr-dot b"></div>
      <div class="cr-dot o"></div><div class="cr-dot y"></div>
    </div>
    <div class="cr-line"></div>
  </div>
  <div class="merci-main">Merci d'avoir regardé</div>
  <div class="merci-sub">à très bientôt · toofi</div>
</div>

<div class="wave-wrap">
  <canvas id="waveCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('waveCanvas');
canvas.width = 1920; canvas.height = 80;
const ctx = canvas.getContext('2d');
let t = 0;

function draw() {
  ctx.clearRect(0, 0, 1920, 80);
  ctx.beginPath();
  for (let x = 0; x < 1920; x++) {
    const p = x / 1920;
    const y = 40
      + Math.sin((p*Math.PI*5.5)+t*0.33)*17
      + Math.sin((p*Math.PI*2.5)+t*0.18)*8;
    if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle = 'rgba(245,223,160,0.4)'; ctx.lineWidth = 1.6; ctx.stroke();

  ctx.beginPath();
  for (let x = 0; x < 1920; x++) {
    const p = x / 1920;
    const shaped = Math.tanh(Math.sin((p*Math.PI*9)+t*0.48)*2.2)*0.87;
    const y = 40 + shaped*12 + Math.sin((p*Math.PI*3)+t*0.25)*4;
    if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle = 'rgba(60,75,176,0.3)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.beginPath();
  for (let x = 0; x < 1920; x++) {
    const p = x / 1920;
    const y = 40 + Math.sin((p*Math.PI*13)+t*0.6)*7 + Math.sin((p*Math.PI*4)+t*0.22)*3;
    if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle = 'rgba(248,125,55,0.2)'; ctx.lineWidth = 0.8; ctx.stroke();
  t += 0.007;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
