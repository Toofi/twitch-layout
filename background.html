<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --juno-red:    #b13a26;
    --juno-blue:   #3c4bb0;
    --juno-orange: #f87d37;
    --juno-yellow: #e9bc3f;
    --bg:          #1e1c18;
  }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── FOND — dégradé 4 couleurs statique ── */
  .bg-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(
      120deg,
      rgba(177,58,38,0.09)   0%,
      rgba(30,28,24,1)       20%,
      rgba(60,75,176,0.07)   40%,
      rgba(30,28,24,1)       55%,
      rgba(248,125,55,0.08)  72%,
      rgba(30,28,24,1)       85%,
      rgba(233,188,63,0.06)  100%
    );
  }

  /* ── LÉGÈRE RESPIRATION VERTICALE ── */
  .bg-breathe {
    position: absolute; inset: 0;
    background: radial-gradient(
      ellipse 160% 120% at 50% 50%,
      rgba(60,75,176,0.04) 0%,
      transparent 65%
    );
    animation: breathe 12s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    0%   { opacity: 0.4; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.04); }
  }

  /* ── TEXTURE MÉTAL BROSSÉ ── */
  .metal {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent             0px,
      transparent             2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 3px
    );
    pointer-events: none;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.055) 0px,
      rgba(0,0,0,0.055) 1px,
      transparent        1px,
      transparent        4px
    );
    pointer-events: none;
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(
      ellipse 110% 110% at 50% 50%,
      transparent 45%,
      rgba(0,0,0,0.45) 100%
    );
    pointer-events: none;
  }

  /* ── RACK STRIPES LATÉRAUX ── */
  .rack-l, .rack-r {
    position: absolute; top: 0; bottom: 0;
    width: 3px; opacity: 0.55;
  }
  .rack-l {
    left: 0;
    background: linear-gradient(180deg,
      var(--juno-red),
      var(--juno-blue),
      var(--juno-orange),
      var(--juno-yellow)
    );
  }
  .rack-r {
    right: 0;
    background: linear-gradient(180deg,
      var(--juno-yellow),
      var(--juno-orange),
      var(--juno-blue),
      var(--juno-red)
    );
  }

  /* ── PARTICULES DE BRUIT (optique CRT) ── */
  .noise {
    position: absolute; inset: 0;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    animation: noiseShift 0.12s steps(1) infinite;
  }
  @keyframes noiseShift {
    0%  { background-position:   0px   0px; }
    25% { background-position: -64px  32px; }
    50% { background-position:  32px -48px; }
    75% { background-position: -32px  64px; }
  }

  /* ── INFOS BAS DROITE ── */
  .info-panel {
    position: absolute;
    bottom: 28px; right: 20px;
    display: flex; align-items: center; gap: 0;
    z-index: 10;
  }

  .brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  @keyframes shimmer {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  .logo-stack { position:relative; display:inline-block; line-height:0.88; }
  .t-tnr {
    font-family:'Times New Roman',Times,serif;
    font-style:italic; font-weight:400; font-size:20px;
    position:absolute; top:0; left:0;
    white-space:nowrap; pointer-events:none;
    background:linear-gradient(135deg,#b13a26 0%,#3c4bb0 28%,#f87d37 55%,#e9bc3f 78%,#b13a26 100%);
    background-size:300% 300%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 10s ease-in-out infinite;
  }
  .t-av {
    font-family:'Avenir Next Condensed','Avenir','Arial Narrow','Gill Sans MT Condensed',sans-serif;
    font-weight:400; font-size:20px; letter-spacing:-0.01em;
    position:relative; white-space:nowrap;
    background:linear-gradient(135deg,#b13a26 0%,#3c4bb0 28%,#f87d37 55%,#e9bc3f 78%,#b13a26 100%);
    background-size:300% 300%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 10s ease-in-out infinite;
  }
  .brand-leds { display:flex; gap:5px; align-items:center; }
  .b-led {
    width:4px; height:4px; border-radius:50%;
    animation:bLed var(--d,3s) ease-in-out infinite var(--dl,0s);
  }
  @keyframes bLed { 0%,80%,100%{opacity:.2;} 40%{opacity:.9;} }

  .vsep {
    width:1px; height:26px;
    background:rgba(255,255,255,0.18);
    margin:0 22px; flex-shrink:0;
  }

  .time-block { flex-shrink:0; display:flex; align-items:baseline; gap:8px; }
  .time-val {
    font-family:'Share Tech Mono',monospace;
    font-size:22px; color:#f5dfa0;
    letter-spacing:2px; line-height:1;
    text-shadow:0 1px 5px rgba(0,0,0,0.95);
  }
  .date-val {
    font-family:'Share Tech Mono',monospace;
    font-size:11px; color:#a09880;
    letter-spacing:1px;
    text-shadow:0 1px 4px rgba(0,0,0,0.95);
  }

  .follow-block { flex-shrink:0; display:flex; align-items:center; gap:7px; }
  .follow-dot {
    width:5px; height:5px; border-radius:50%;
    background:#b13a26; flex-shrink:0;
    animation:fpulse 3s ease-in-out infinite;
  }
  @keyframes fpulse { 0%,100%{opacity:.35;} 50%{opacity:1;} }
  .follow-label {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:3px;
    color:#a09880; text-transform:uppercase; flex-shrink:0;
    text-shadow:0 1px 4px rgba(0,0,0,0.95);
  }
  .follow-name {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; font-weight:600;
    color:#e8e4dc; letter-spacing:1px;
    max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 4px rgba(0,0,0,0.95);
  }

  /* ── FONDUS DE COULEUR ── */
  .color-wash {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
  }
  .cw-r { background: radial-gradient(ellipse 55% 40% at 20% 55%, rgba(177,58,38,0.13) 0%, transparent 70%);
           animation: cwFade 20s ease-in-out infinite 0s; }
  .cw-b { background: radial-gradient(ellipse 50% 45% at 78% 42%, rgba(60,75,176,0.13) 0%, transparent 70%);
           animation: cwFade 25s ease-in-out infinite 6s; }
  .cw-o { background: radial-gradient(ellipse 52% 38% at 55% 70%, rgba(248,125,55,0.11) 0%, transparent 70%);
           animation: cwFade 18s ease-in-out infinite 11s; }
  .cw-y { background: radial-gradient(ellipse 48% 42% at 35% 30%, rgba(233,188,63,0.11) 0%, transparent 70%);
           animation: cwFade 22s ease-in-out infinite 4s; }
  @keyframes cwFade {
    0%, 100% { opacity: 0; }
    35%, 65%  { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-breathe"></div>
  <div class="metal"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="rack-l"></div>
  <div class="rack-r"></div>
  <div class="color-wash cw-r"></div>
  <div class="color-wash cw-b"></div>
  <div class="color-wash cw-o"></div>
  <div class="color-wash cw-y"></div>

  <!-- ── INFOS BAS DROITE ── -->
  <div class="info-panel">
    <div class="brand">
      <div class="logo-stack"><div class="t-tnr">Toofi</div><div class="t-av">Toofi</div></div>
      <div class="brand-leds">
        <div class="b-led" style="background:#b13a26;--d:4s;  --dl:0s"></div>
        <div class="b-led" style="background:#3c4bb0;--d:5s;  --dl:.7s"></div>
        <div class="b-led" style="background:#f87d37;--d:3.5s;--dl:1.4s"></div>
        <div class="b-led" style="background:#e9bc3f;--d:4.5s;--dl:2.1s"></div>
      </div>
    </div>
    <div class="vsep"></div>
    <div class="time-block">
      <div class="time-val" id="clock">--:--</div>
      <div class="date-val" id="datestr">--/--/----</div>
    </div>
    <div class="vsep"></div>
    <div class="follow-block">
      <div class="follow-dot"></div>
      <div class="follow-label">Follow</div>
      <div class="follow-name" id="followName">En attente…</div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════
   HORLOGE
   ════════════════════════════════════════════════ */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  const dd = String(n.getDate()).padStart(2,'0');
  const mm = String(n.getMonth()+1).padStart(2,'0');
  document.getElementById('datestr').textContent = `${dd}/${mm}/${n.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 10000);

/* ════════════════════════════════════════════════
   TWITCH — dernier follow
   ════════════════════════════════════════════════ */
const TW_CLIENT_ID     = '2u00o86legvbgoo6lwpmorczuatjib';
const TW_CLIENT_SECRET = '2ugkp32z3q1hb2jepdwk247ycxoz5l';
const TW_REFRESH_TOKEN = 'pq5u64kwaie8j2lkee8c08dqjr41rvs3472fc3gzbspvz15mhg';
const TW_BROADCASTER   = '44582688';

let twToken = null, twTokenExpiry = 0, lastFollower = null;

async function twGetToken() {
  if (twToken && Date.now() < twTokenExpiry) return twToken;
  const res = await fetch('https://id.twitch.tv/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     TW_CLIENT_ID,
      client_secret: TW_CLIENT_SECRET,
      refresh_token: TW_REFRESH_TOKEN,
      grant_type:    'refresh_token',
    })
  });
  const data = await res.json();
  if (data.access_token) {
    twToken = data.access_token;
    twTokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
  }
  return twToken;
}

async function fetchLatestFollower() {
  try {
    const token = await twGetToken();
    if (!token) return;
    const res = await fetch(
      `https://api.twitch.tv/helix/channels/followers?broadcaster_id=${TW_BROADCASTER}&first=1`,
      { headers: { 'Client-Id': TW_CLIENT_ID, 'Authorization': 'Bearer ' + token } }
    );
    const data = await res.json();
    const name = data.data?.[0]?.user_name;
    if (name && name !== lastFollower) {
      lastFollower = name;
      document.getElementById('followName').textContent = name;
    }
  } catch(e) {}
}
fetchLatestFollower();
setInterval(fetchLatestFollower, 30000);
</script>
</body>
</html>
