<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --juno-red:    #b13a26;
    --juno-blue:   #3c4bb0;
    --juno-orange: #f87d37;
    --juno-yellow: #e9bc3f;
    --juno-blue-bright: #6478dc;
    --serigraph:   #e8e4dc;
    --ivory:       #f5dfa0;
    --muted:       #a09880;

    /* Barre 188px — webcam 320×180 (16:9 exact) */
    --bar-top: 892px;
    --bar-h:   188px;
    --cam-w:   320px;
  }

  body {
    width:1920px; height:1080px;
    background:transparent;
    overflow:hidden;
    font-family:'Rajdhani', sans-serif;
  }

  /* Fond animé */
  .bar-bg {
    position:absolute;
    top:var(--bar-top); left:0; right:0; bottom:0;
    background:#242220;
    overflow:hidden;
  }
  .bar-bg::before {
    content:''; position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, transparent 0px, rgba(255,255,255,0.022) 1px, transparent 2px, transparent 5px),
      linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,0,0,0.18) 100%);
  }
  .bar-bg::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px);
    animation:barScan 8s linear infinite;
  }
  @keyframes barScan {
    0%   { background-position:0 0; }
    100% { background-position:0 60px; }
  }

  /* Liseré 4 couleurs */
  .bar-stripe {
    position:absolute;
    top:var(--bar-top); left:0; right:0;
    height:3px; display:flex;
  }
  .bs   { flex:1; opacity:.9; }
  .bs-r { background:var(--juno-red); }
  .bs-b { background:var(--juno-blue); }
  .bs-o { background:var(--juno-orange); }
  .bs-y { background:var(--juno-yellow); }

  /* Rack stripes */
  .rack-l {
    position:absolute;
    top:var(--bar-top); left:0; bottom:0;
    width:3px;
    background:linear-gradient(180deg,var(--juno-red),var(--juno-blue),var(--juno-orange),var(--juno-yellow)); opacity:.75;
  }
  .rack-r {
    position:absolute;
    top:var(--bar-top); right:0; bottom:0;
    width:3px;
    background:linear-gradient(180deg,var(--juno-yellow),var(--juno-orange),var(--juno-blue),var(--juno-red)); opacity:.75;
  }

  /* Cadre webcam — 320×180 (16:9) */
  .cam-frame {
    position:absolute;
    left:4px;
    top:calc(var(--bar-top) + 4px);
    width:var(--cam-w);
    bottom:4px;
    background:transparent;
    border:1px solid rgba(100,100,102,0.3);
  }
  .cam-frame::before {
    content:''; position:absolute; top:-1px; left:-1px;
    width:14px; height:14px;
    border-top:2px solid var(--juno-red);
    border-left:2px solid var(--juno-red);
  }
  .cam-frame::after {
    content:''; position:absolute; bottom:-1px; right:-1px;
    width:14px; height:14px;
    border-bottom:2px solid var(--juno-orange);
    border-right:2px solid var(--juno-orange);
  }
  .cam-corner-tr {
    position:absolute; top:-1px; right:-1px;
    width:14px; height:14px;
    border-top:2px solid var(--juno-yellow);
    border-right:2px solid var(--juno-yellow);
  }
  .cam-corner-bl {
    position:absolute; bottom:-1px; left:-1px;
    width:14px; height:14px;
    border-bottom:2px solid var(--juno-blue);
    border-left:2px solid var(--juno-blue);
  }
  .cam-label {
    position:absolute;
    top:calc(var(--bar-top) + 8px);
    left:10px;
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:3px;
    color:rgba(200,168,107,0.4); text-transform:uppercase;
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
  }

  /* Séparateur après webcam */
  .cam-vsep {
    position:absolute;
    left:calc(var(--cam-w) + 8px);
    top:calc(var(--bar-top) + 16px);
    bottom:16px;
    width:1px;
    background:linear-gradient(180deg, transparent, rgba(255,255,255,0.15) 25%, rgba(255,255,255,0.15) 75%, transparent);
  }

  /* Contenu de la barre */
  .bar-content {
    position:absolute;
    left:calc(var(--cam-w) + 20px);
    right:3px;
    top:var(--bar-top);
    bottom:0;
    display:flex; align-items:center;
    padding:0 28px; gap:0;
  }

  /* Pseudo */
  .brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .brand-name {
    font-family:'Rajdhani',sans-serif;
    font-size:24px; font-weight:700;
    letter-spacing:5px; text-transform:uppercase;
    color:rgba(240,237,232,0.85);
    text-shadow:0 1px 4px rgba(0,0,0,0.85);
  }
  .brand-name .p-blue { color:var(--juno-blue-bright); }
  .brand-leds { display:flex; gap:5px; align-items:center; }
  .b-led {
    width:5px; height:5px; border-radius:50%;
    animation:bLed var(--d,3s) ease-in-out infinite var(--dl,0s);
  }
  @keyframes bLed { 0%,80%,100%{opacity:.2;} 40%{opacity:.9;} }

  .vsep {
    width:1px; height:32px;
    background:rgba(255,255,255,0.2);
    margin:0 30px; flex-shrink:0;
  }

  /* Heure + date */
  .time-block { flex-shrink:0; display:flex; align-items:baseline; gap:8px; }
  .time-val {
    font-family:'Share Tech Mono',monospace;
    font-size:28px; color:var(--ivory);
    letter-spacing:2px; line-height:1;
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
  }
  .date-val {
    font-family:'Share Tech Mono',monospace;
    font-size:12px; color:var(--muted);
    letter-spacing:1px;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
  }

  /* Follow */
  .follow-block { flex-shrink:0; display:flex; align-items:center; gap:8px; }
  .follow-dot {
    width:5px; height:5px; border-radius:50%;
    background:var(--juno-red); flex-shrink:0;
    animation:fpulse 3s ease-in-out infinite;
  }
  @keyframes fpulse { 0%,100%{opacity:.35;} 50%{opacity:1;} }
  .follow-label {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:3px;
    color:var(--muted); text-transform:uppercase; flex-shrink:0;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
  }
  .follow-name {
    font-family:'Rajdhani',sans-serif;
    font-size:18px; font-weight:600;
    color:var(--serigraph); letter-spacing:1px;
    max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
  }

  /* Tag mode Ableton — calé à droite */
  .mode-tag {
    margin-left:auto;
    flex-shrink:0;
    display:flex; align-items:center; gap:8px;
  }
  .mode-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--juno-orange);
    animation:modePulse 2.5s ease-in-out infinite;
  }
  @keyframes modePulse { 0%,100%{opacity:.3; box-shadow:none;} 50%{opacity:1; box-shadow:0 0 6px var(--juno-orange);} }
  .mode-label {
    font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(248,125,55,0.65);
    text-shadow:0 0 10px rgba(248,125,55,0.25);
  }
</style>
</head>
<body>

<div class="bar-bg"></div>

<div class="bar-stripe">
  <div class="bs bs-r"></div><div class="bs bs-b"></div>
  <div class="bs bs-o"></div><div class="bs bs-y"></div>
</div>
<div class="rack-l"></div>
<div class="rack-r"></div>

<div class="cam-frame">
  <div class="cam-corner-tr"></div>
  <div class="cam-corner-bl"></div>
</div>
<div class="cam-label">Cam</div>
<div class="cam-vsep"></div>

<div class="bar-content">
  <div class="brand">
    <div class="brand-name">T<span class="p-blue">o</span>ofi</div>
    <div class="brand-leds">
      <div class="b-led" style="background:var(--juno-red);   --d:4s;  --dl:0s"></div>
      <div class="b-led" style="background:var(--juno-blue);  --d:5s;  --dl:.7s"></div>
      <div class="b-led" style="background:var(--juno-orange);--d:3.5s;--dl:1.4s"></div>
      <div class="b-led" style="background:var(--juno-yellow);--d:4.5s;--dl:2.1s"></div>
    </div>
  </div>

  <div class="vsep"></div>

  <div class="time-block">
    <div class="time-val" id="clock">--:--</div>
    <div class="date-val" id="datestr">--/--/----</div>
  </div>

  <div class="vsep"></div>

  <div class="follow-block">
    <div class="follow-dot"></div>
    <div class="follow-label">Follow</div>
    <div class="follow-name" id="followName">En attente…</div>
  </div>

  <div class="mode-tag">
    <div class="mode-dot"></div>
    <div class="mode-label">Ableton Live</div>
  </div>
</div>

<script>
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  const dd = String(n.getDate()).padStart(2,'0');
  const mm = String(n.getMonth()+1).padStart(2,'0');
  document.getElementById('datestr').textContent = `${dd}/${mm}/${n.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 10000);

function updateFollow(name){ document.getElementById('followName').textContent = name||'En attente…'; }

const TWITCH_CLIENT_ID     = '2u00o86legvbgoo6lwpmorczuatjib';
const TWITCH_CLIENT_SECRET = '2ugkp32z3q1hb2jepdwk247ycxoz5l';
const TWITCH_REFRESH_TOKEN = 'pq5u64kwaie8j2lkee8c08dqjr41rvs3472fc3gzbspvz15mhg';
const TWITCH_BROADCASTER   = '44582688';

let twAccessToken = null, twTokenExpiry = 0, lastFollower = null;

async function twGetToken() {
  if (twAccessToken && Date.now() < twTokenExpiry) return twAccessToken;
  const res = await fetch('https://id.twitch.tv/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     TWITCH_CLIENT_ID,
      client_secret: TWITCH_CLIENT_SECRET,
      refresh_token: TWITCH_REFRESH_TOKEN,
      grant_type:    'refresh_token',
    })
  });
  const data = await res.json();
  if (data.access_token) {
    twAccessToken = data.access_token;
    twTokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
  }
  return twAccessToken;
}

async function fetchLatestFollower() {
  try {
    const token = await twGetToken();
    if (!token) return;
    const res = await fetch(
      `https://api.twitch.tv/helix/channels/followers?broadcaster_id=${TWITCH_BROADCASTER}&first=1`,
      { headers: { 'Client-Id': TWITCH_CLIENT_ID, 'Authorization': 'Bearer ' + token } }
    );
    const data = await res.json();
    const name = data.data?.[0]?.user_name;
    if (name && name !== lastFollower) { lastFollower = name; updateFollow(name); }
  } catch(e) {}
}
fetchLatestFollower();
setInterval(fetchLatestFollower, 30000);
</script>
</body>
</html>
