:root {
  --juno-red:    #b13a26;
  --juno-blue:   #3c4bb0;
  --juno-orange: #f87d37;
  --juno-yellow: #e9bc3f;
  --bg:          #1e1c18;
  --text:        #f0ede8;
  --dim:         rgba(240,237,232,0.25);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}

/* Chrome Juno */
.rack-l, .rack-r {
  position: fixed; top: 0; bottom: 0; width: 3px; opacity: 0.55; z-index: 100; pointer-events: none;
}
.rack-l { left:0; background: linear-gradient(180deg, var(--juno-red), var(--juno-blue), var(--juno-orange), var(--juno-yellow)); }
.rack-r { right:0; background: linear-gradient(180deg, var(--juno-yellow), var(--juno-orange), var(--juno-blue), var(--juno-red)); }
.band-top, .band-bot { position: fixed; left:0; right:0; height:4px; display:flex; z-index:100; pointer-events:none; }
.band-top { top:0; } .band-bot { bottom:0; }
.b { flex:1; opacity:.85; }
.b-r { background:var(--juno-red); } .b-b { background:var(--juno-blue); }
.b-o { background:var(--juno-orange); } .b-y { background:var(--juno-yellow); }

/* Hero */
.hero {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 85vh; padding: 60px 40px 48px; gap: 32px;
}

/* Stack */
.stack { position: relative; display: inline-block; line-height: 0.88; }

/* Floral Capitals — fond avec dégradé oblique animé */
.t-floral {
  font-family: 'FloralCapitals', serif;
  font-weight: normal;
  position: absolute;
  top: 0; left: 0;
  white-space: nowrap;
  pointer-events: none;
  background: linear-gradient(
    135deg,
    var(--juno-red) 0%,
    var(--juno-blue) 28%,
    var(--juno-orange) 55%,
    var(--juno-yellow) 78%,
    var(--juno-red) 100%
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 10s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
@media (prefers-reduced-motion: reduce) {
  .t-floral { animation: none; background-position: 30% 30%; }
}

/* Avenir Condensed — surlogo monochrome */
.t-av {
  font-family: 'Avenir Next Condensed', 'Avenir', 'Arial Narrow', 'Gill Sans MT Condensed', sans-serif;
  font-weight: 400;
  position: relative;
  white-space: nowrap;
}

/* Hero sizes */
.hero .t-av    { font-size: clamp(72px, 18vw, 260px); color: var(--text); letter-spacing: -0.01em; }
.hero .t-floral{ font-size: clamp(80px, 20vw, 290px); }

/* Trio */
.trio { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.06); }
.trio-cell {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 64px 32px 52px; gap: 22px; min-height: 280px;
}
.trio-cell + .trio-cell { border-left: 1px solid rgba(255,255,255,0.05); }

/* Trio A : surlogo blanc */
.var-w .t-av    { font-size: clamp(40px, 6.5vw, 90px); color: var(--text); letter-spacing: -0.01em; }
.var-w .t-floral{ font-size: clamp(44px, 7.2vw, 100px); }

/* Trio B : surlogo rouge */
.var-r .t-av    { font-size: clamp(40px, 6.5vw, 90px); color: var(--juno-red); letter-spacing: -0.01em; }
.var-r .t-floral{ font-size: clamp(44px, 7.2vw, 100px); }

/* Trio C : surlogo bleu */
.var-b .t-av    { font-size: clamp(40px, 6.5vw, 90px); color: var(--juno-blue); letter-spacing: -0.01em; }
.var-b .t-floral{ font-size: clamp(44px, 7.2vw, 100px); }

/* Labels */
.eyebrow { font-size:9px; letter-spacing:5px; text-transform:uppercase; color:var(--dim); }
.caption { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); text-align:center; line-height:2; }
</style>
</head>
<body>

<div class="rack-l"></div><div class="rack-r"></div>
<div class="band-top"><div class="b b-r"></div><div class="b b-b"></div><div class="b b-o"></div><div class="b b-y"></div></div>
<div class="band-bot"><div class="b b-y"></div><div class="b b-o"></div><div class="b b-b"></div><div class="b b-r"></div></div>

<section class="hero">
  <div class="eyebrow">Essai logo · Toofi · Floral Capitals</div>
  <div class="stack">
    <div class="t-floral">Toofi</div>
    <div class="t-av">Toofi</div>
  </div>
  <div class="caption">
    Floral Capitals · dégradé Juno oblique animé<br>
    Avenir Condensed Regular · blanc monochrome
  </div>
</section>

<section class="trio">
  <div class="trio-cell">
    <div class="stack var-w">
      <div class="t-floral">Toofi</div>
      <div class="t-av">Toofi</div>
    </div>
    <div class="caption">Blanc pur<br>maximum contraste</div>
  </div>
  <div class="trio-cell">
    <div class="stack var-r">
      <div class="t-floral">Toofi</div>
      <div class="t-av">Toofi</div>
    </div>
    <div class="caption">Rouge Juno<br>surlogo teinté</div>
  </div>
  <div class="trio-cell">
    <div class="stack var-b">
      <div class="t-floral">Toofi</div>
      <div class="t-av">Toofi</div>
    </div>
    <div class="caption">Bleu Juno<br>surlogo teinté</div>
  </div>
</section>

<script>
async function alignLetters() {
  await document.fonts.ready;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  document.querySelectorAll('.stack').forEach(stack => {
    const floralEl = stack.querySelector('.t-floral');
    const avEl     = stack.querySelector('.t-av');
    if (!floralEl || !avEl) return;

    const floralSize = parseFloat(getComputedStyle(floralEl).fontSize);
    const avSize     = parseFloat(getComputedStyle(avEl).fontSize);
    const word = avEl.textContent.trim();

    // Largeur de chaque lettre en Floral Capitals
    ctx.font = `normal ${floralSize}px FloralCapitals`;
    const floralWidths = Array.from(word).map(c => ctx.measureText(c).width);

    // Reconstruire l'élément Avenir : une span par lettre,
    // chaque span a la largeur de la lettre Floral correspondante
    avEl.textContent = '';
    Array.from(word).forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.display      = 'inline-block';
      span.style.width        = floralWidths[i] + 'px';
      span.style.textAlign    = 'center';
      avEl.appendChild(span);
    });
  });
}

alignLetters();
</script>

</body>
</html>
